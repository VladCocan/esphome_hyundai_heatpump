esphome:
  name: hp-control
  friendly_name: Hyundai R290
  name_add_mac_suffix: false

external_components:
  - source:
      type: local
      path: components
    components: [hyundai_heatpump]
    refresh: 0s

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: INFO

api:
  encryption:
    key: !secret api_key
  reboot_timeout: 5min

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE

  manual_ip:
    static_ip: 192.168.1.37
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1
    dns2: 8.8.4.4

  ap:
    ssid: "HP Fallback Hotspot"
    password: !secret ap_password

captive_portal:

button:
  - platform: restart
    name: hp-control restart

sensor:
  - platform: uptime
    name: Uptime
    icon: mdi:timelapse

uart:
  id: uart_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600
  parity: NONE
  stop_bits: 1

hyundai_heatpump:
  id: heatpump
  uart_id: uart_bus
  address: 1
  update_interval: 10s
