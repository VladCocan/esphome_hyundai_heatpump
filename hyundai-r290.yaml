substitutions:
  devicename: heatpump
  description: Heatpump Controller
esphome:
  name: hp-control
  friendly_name: Hyundai R290
  name_add_mac_suffix: false

external_components:
  - source:
      type: local
      path: components

esp32:
  board: esp32dev
  framework:
    type: esp-idf

  
# [Optional] - Create web interface where you can control the AC from your web browser (without Home Assistant)
#web_server:
#  port: 80

# Enable logging
logger:
    level: INFO

# Enable Home Assistant API
api:
  encryption: 
    key: !secret api_key
  reboot_timeout: 5min
    

# Allow Over-The-Air updates
ota:
  - platform: esphome
    password: !secret ota_password


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE

  manual_ip:
    static_ip: 192.168.1.37
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1
    dns2: 8.8.4.4

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "HP Fallback Hotspot"
    password: !secret ap_password

captive_portal:


# Restart
button:
  - platform: restart
    name: hp-control restart


uart:
  id: uart_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600
  parity: NONE
  stop_bits: 1

modbus:
  id: modbus1
  uart_id: uart_bus

hyundai_heatpump:
  id: hyundai_backend
  modbus_id: modbus1
  address: 1
  update_interval: 10s

modbus_controller:
  id: heatpump
  address: 1
  modbus_id: modbus1
  update_interval: 10s

 

globals:
  - id: unmasked_value_register_0
    type: uint16_t
    restore_value: no
    initial_value: '0'
  - id: unmasked_value_register_5
    type: uint16_t
    restore_value: no
    initial_value: '0'
  - id: unmasked_value_water_temperature_t1s
    type: uint16_t
    restore_value: no
    initial_value: '0'
  - id: unmasked_curve_selection
    type: uint16_t
    restore_value: no
    initial_value: '0'
  - id: unmasked_value_register_270
    type: uint16_t
    restore_value: no
    initial_value: '0'
  - id: unmasked_value_register_273
    type: uint16_t
    restore_value: no
    initial_value: '0'
  - id: unmasked_value_register_274
    type: uint16_t
    restore_value: no
    initial_value: '0'
  - id: unmasked_value_register_277
    type: uint16_t
    restore_value: no
    initial_value: '0'
  - id: unmasked_value_register_278
    type: uint16_t
    restore_value: no
    initial_value: '0'
  - id: compressor_start_count
    type: int
    restore_value: no
    initial_value: '0'


select:
  - platform: template
    name: "HP GAS Mode Select"
    id: ${devicename}_HP_GAS_mode_select
    icon: mdi:state-machine
    options:
      - "Auto"
      - "Manual"
    optimistic: true
sensor:
  - platform: template
    name: "Compressor Starts Per Hour"
    id: compressor_starts_per_hour
    unit_of_measurement: "starts/h"
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      return id(compressor_start_count);

  - platform: uptime
    name: Uptime
    id: "${devicename}_uptime"
    icon: mdi:timelapse
  - platform: modbus_controller
    modbus_controller_id: "${devicename}"
    name: "Register 0 switches"
    id: "${devicename}_register_0_switches"
    internal: true
    register_type: holding
    address: 0x0
    value_type: U_WORD
    icon: mdi:eye
    lambda: |-
      // Update the global var unmasked_value_register_0
      id(unmasked_value_register_0) = x;
      return x;
  - platform: modbus_controller
    modbus_controller_id: "${devicename}"
    name: "Register 5 switches"
    id: "${devicename}_register_5_switches"
    internal: true
    register_type: holding
    address: 0x5
    value_type: U_WORD
    icon: mdi:eye
    lambda: |-
      // Update the global var unmasked_value_register_5
      id(unmasked_value_register_5) = x;
