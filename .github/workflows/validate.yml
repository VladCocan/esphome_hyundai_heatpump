name: Validate ESPHome Config

on:
  push:
    paths:
      - ".github/workflows/validate.yml"
      - "components/**"
      - "hyundai-r290.yaml"
      - "secrets.example.yaml"
      - "README.md"
      - "CONTRIBUTING.md"
  pull_request:
    paths:
      - ".github/workflows/validate.yml"
      - "components/**"
      - "hyundai-r290.yaml"
      - "secrets.example.yaml"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ESPHome
        run: pip install esphome==2026.3.1

      - name: Prepare secrets
        run: cp secrets.example.yaml secrets.yaml

      - name: Validate configuration
        run: esphome config hyundai-r290.yaml